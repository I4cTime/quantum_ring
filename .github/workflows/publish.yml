name: Publish to npm & MCP Registry

on:
  release:
    types: [created]
  # Allow re-publishing a tag manually if the release-triggered run fails.
  # Pick the tag (or any branch) when dispatching from the Actions tab.
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish (defaults to the current branch)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Intentionally NOT running `npm install -g npm@latest` here:
      # on the Node 22 runner image it currently fails with
      # "Cannot find module 'promise-retry'" during npm's own
      # self-upgrade (broke v0.9.9 and v0.10.0 publish runs). The
      # bundled npm in setup-node@v4 is recent enough for `npm publish
      # --provenance --access public`; pin a specific version here only
      # if a future npm feature requires it.

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
