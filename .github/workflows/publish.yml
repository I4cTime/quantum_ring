name: Publish to npm & MCP Registry

on:
  release:
    # "published" (not "created") so draft releases never trigger a publish;
    # matches the trigger update-homebrew.yml already uses.
    types: [published]
  # Allow re-publishing a tag manually if the release-triggered run fails.
  # Pick the tag (or any branch) when dispatching from the Actions tab.
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish (defaults to the current branch)"
        required: false
        type: string
  # Called from release.yml on tag push (GITHUB_TOKEN-created releases don't
  # emit events, so the release:published trigger can't fire for that path).
  workflow_call:
    inputs:
      ref:
        description: "Git ref to publish (defaults to the calling ref)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

# Never run two publishes at once (e.g. release event + manual re-dispatch);
# don't cancel an in-flight publish either.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}

      # pnpm version comes from the "packageManager" field in package.json;
      # do not also pin "version" here (pnpm/action-setup errors on conflict).
      # Must run before setup-node so `cache: pnpm` can find the pnpm binary.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          # Node 24 bundles npm 11.5+, which is the minimum required for
          # OIDC trusted publishing on npmjs.com. Node 22 ships npm 10.x,
          # which silently fails with a misleading `E404 Not Found` when
          # the registry rejects the OIDC token (this blocked the
          # v0.10.1 publish even after the trusted publisher was
          # configured). See:
          # https://docs.npmjs.com/trusted-publishers
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      # Intentionally NOT running `npm install -g npm@latest` here:
      # on the runner image it has been observed to fail with
      # "Cannot find module 'promise-retry'" during npm's own
      # self-upgrade. Node 24's bundled npm is already >= 11.5.1, so
      # no upgrade is needed for trusted publishing or provenance.

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Publish to npm
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "npm already has $NAME@$VER — skipping (idempotent re-run)."
          else
            npm publish --provenance --access public
          fi

      - name: Install mcp-publisher
        # Pinned (not `latest`) so a breaking mcp-publisher release or renamed
        # asset can't silently break the publish critical path.
        env:
          MCP_PUBLISHER_VERSION: v1.7.9
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
